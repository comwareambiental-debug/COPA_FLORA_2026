<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>COPA FLORA 2026</title>

<style>

body{
background:#081b3a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.contenedor{
background:white;
padding:30px;
width:900px;
border-radius:20px;
text-align:center;
box-shadow:0px 0px 25px rgba(0,0,0,.4);
}

Img{
width:100%;
max-height:450px;
object-fit:contain;
border-radius:10px;
margin-bottom:20px;
}

.opcion{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:10px;
background:#f2f2f2;
}

.opcion:hover{
background:#dddddd;
}

#tiempo{
font-size:35px;
color:red;
font-weight:bold;
}

#pregunta{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="contenedor">

<img id="imagen" src="Img/pregunta1.jpeg">

<div id="pregunta"></div>

<h1 id="tiempo"></h1>

<div id="respuestas"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz97_36DDi1Vmsj2y_6Nc6ZXxgG5PM21wYy2PNXRxk33r_Rqt0o9T09Ywbi3Zpq8Czx/exec";

const preguntas = [
{
pregunta:"¿El aumento de residuos electrónicos hace parte de la selección ambiental de ComWare?",
tiempo:15,
correcta:"Falso",
opciones:["Verdadero","Falso"],
imagen:"Img/pregunta1.jpeg"
},

{
pregunta:"¿Cuál es la gran estrategia ganadora de la política ambiental de ComWare?",
tiempo:30,
correcta:"D",
opciones:[
"A. Incrementar la producción tecnológica",
"B. Comprar más equipos tecnológicos",
"C. Reducir únicamente el consumo de papel",
"D. Garantizar operaciones sostenibles, mejorando el desempeño ambiental"
],
imagen:"Img/pregunta2.jpeg"
},

{
pregunta:"¿Qué acción haría que el árbitro ambiental te saque tarjeta roja?",
tiempo:30,
correcta:"D",
opciones:[
"A. Gestionar adecuadamente RAEE",
"B. Optimizar recursos",
"C. Promover economía circular",
"D. Desechar equipos electrónicos con residuos ordinarios"
],
imagen:"Img/pregunta3.jpeg"
},

{
pregunta:"¿Qué significa RAEE?",
tiempo:30,
correcta:"C",
opciones:[
"A. Recursos ambientales para empresas eficientes",
"B. Residuos de computadoras y teclados",
"C. Residuos de aparatos eléctricos y electrónicos",
"D. Registro ambiental de equipos electrónicos"
],
imagen:"Img/pregunta4.jpeg"
},

{
pregunta:"¿Un computador nuevo hace parte del equipo RAEE?",
tiempo:15,
correcta:"Falso",
opciones:["Verdadero","Falso"],
imagen:"Img/pregunta5.jpeg"
},

{
pregunta:"¿Cuál representa un verdadero gol ambiental?",
tiempo:30,
correcta:"D",
opciones:[
"A. Usar-guardar-reemplazar",
"B. Comprar-consumir-desechar",
"C. Comprar-votar-usar",
"D. Usar-reutilizar-reparar-reciclar-aprovechar"
],
imagen:"Img/pregunta6.jpeg"
},

{
pregunta:"¿Qué recurso busca optimizar ComWare?",
tiempo:30,
correcta:"C",
opciones:[
"A. Carbón",
"B. Gasolina",
"C. Agua",
"D. Luz solar"
],
imagen:"Img/pregunta7.jpeg"
},

{
pregunta:"Reducir el consumo de energía ayuda a disminuir:",
tiempo:30,
correcta:"C",
opciones:[
"A. Residuos orgánicos",
"B. Número de computadores",
"C. Huella de carbono",
"D. Uso de internet"
],
imagen:"Img/pregunta8.jpeg"
},

{
pregunta:"¿Qué aspectos ambientales busca optimizar ComWare?",
tiempo:30,
correcta:"A",
opciones:[
"A. Energía, agua y huella de carbono",
"B. ACPM, gasolina y gas",
"C. Agua, petróleo y gas",
"D. Cemento, cables y residuos"
],
imagen:"Img/pregunta9.jpeg"
},

{
pregunta:"¿Crecer como empresa mientras se protege el planeta hace parte de la política ambiental?",
tiempo:15,
correcta:"Verdadero",
opciones:["Verdadero","Falso"],
imagen:"Img/pregunta10.jpeg"
}

];

let actual = 0;
let puntaje = 0;
let tiempo;
let reloj;

function cargarPregunta(){

const p = preguntas[actual];

document.getElementById("pregunta").innerHTML = p.pregunta;

document.getElementById("imagen").src = p.imagen;

const respuestas =
document.getElementById("respuestas");

respuestas.innerHTML = "";

p.opciones.forEach(opcion=>{

respuestas.innerHTML +=
`<button class="opcion"
onclick="responder('${opcion}')">
${opcion}
</button>`;

});

tiempo = p.tiempo;

document.getElementById("tiempo").innerHTML = tiempo;

reloj = setInterval(()=>{

tiempo--;

document.getElementById("tiempo").innerHTML = tiempo;

if(tiempo<=0){

clearInterval(reloj);

siguientePregunta();

}

},1000);

}

function responder(valor){

clearInterval(reloj);

const correcta =
preguntas[actual].correcta;

let acerto = false;

if(correcta=="A" && valor.startsWith("A")) acerto=true;
if(correcta=="B" && valor.startsWith("B")) acerto=true;
if(correcta=="C" && valor.startsWith("C")) acerto=true;
if(correcta=="D" && valor.startsWith("D")) acerto=true;

if(correcta=="Verdadero" && valor=="Verdadero") acerto=true;
if(correcta=="Falso" && valor=="Falso") acerto=true;

if(acerto){

puntaje += 100 + (tiempo * 5);

alert("✅ Correcto");

}else{

alert("❌ Incorrecto");

}

siguientePregunta();

}

function siguientePregunta(){

actual++;

if(actual>=preguntas.length){

finalizarJuego();

return;

}

cargarPregunta();

}

async function finalizarJuego(){

const nombre =
localStorage.getItem("nombre");

const equipo =
localStorage.getItem("equipo");

try{

await fetch(API_URL,{

method:"POST",

body:JSON.stringify({

nombre:nombre,
equipo:equipo,
puntaje:puntaje

})

});

}catch(error){

alert(error);
console.error(error);

}

document.querySelector(".contenedor").innerHTML = `

<img src="Img/final.jpeg">

<h1>🏆 Juego Finalizado</h1>

<h2>${nombre}</h2>

<h3>Equipo: ${equipo}</h3>

<h1>Puntaje: ${puntaje}</h1>

<p>Resultado enviado correctamente</p>

`;

}

cargarPregunta();

</script>

</body>
</html>
